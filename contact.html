<body class="bg-slate-50 py-20">
    <div class="max-w-lg mx-auto bg-white p-10 rounded-3xl shadow-2xl animate__animated animate__fadeInUp">
        <h2 class="text-3xl font-black mb-2">Book a Therapist</h2>
        <p class="text-slate-500 mb-8 italic">Your journey to wellness starts here.</p>
        
        <form class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Full Name</label>
                <input type="text" class="w-full bg-slate-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-teal-500 transition-all" placeholder="John Doe">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Time</label>
                    <input type="time" class="w-full bg-slate-50 border-none rounded-xl p-4">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Date</label>
                    <input type="date" class="w-full bg-slate-50 border-none rounded-xl p-4">
                </div>
            </div>
            <button class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-teal-600 transition-colors mt-4">SUBMIT BOOKING</button>
        </form>
        <a href="index.html" class="block text-center mt-6 text-sm text-slate-400 hover:text-slate-600 transition-colors underline">Return Home</a>
    </div>
</body>
